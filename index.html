<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxelio - Engine</title>

    <link rel="stylesheet" href="src/styles.css?v=2">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="src/js/projectHandler.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "FIREBASE_API_KEY_PLACEHOLDER",
            authDomain: "FIREBASE_AUTH_DOMAIN_PLACEHOLDER",
            projectId: "FIREBASE_PROJECT_ID_PLACEHOLDER",
            storageBucket: "FIREBASE_STORAGE_BUCKET_PLACEHOLDER",
            messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID_PLACEHOLDER",
            appId: "FIREBASE_APP_ID_PLACEHOLDER"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase synchron initialisiert.");
        }
    </script>

    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/@blockly/field-colour"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script defer src="src/js/engine.js?v=5"></script>
    <script defer src="src/js/textureEditor.js?v=5"></script>
    <script defer src="src/js/blocks.js?v=5"></script>
    <script defer src="src/js/authHandler.js?v=5"></script>

    <style>
        .user-menu {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: #1e1e1e;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.5);
            z-index: 10001;
            border: 1px solid #333;
            border-radius: 4px;
            margin-top: 8px;
        }

        .dropdown-content.show {
            display: block;
        }

        .user-info {
            padding: 12px;
            font-size: 11px;
            color: #888;
            border-bottom: 1px solid #333;
            white-space: nowrap;
        }

        .logout-btn {
            width: 100%;
            background: none;
            border: none;
            color: #ff5555;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 85, 85, 0.1);
        }


        #gameHUD {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            display: none;
        }


        #gameHUD>* {
            pointer-events: auto;
            position: absolute;
        }

        .save-cloud-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #4CFF00;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #4CFF00;
            font-family: monospace;
            font-size: 12px;
            z-index: 10000;
            display: none;
        }
    </style>
</head>

<body>

    <div class="top-nav">
        <div class="nav-left" style="display: flex; align-items: center; gap: 30px;">
            <div class="brand" onclick="window.location.href='dashboard.html'"
                style="cursor:pointer; display: flex; align-items: center; font-weight: 900; letter-spacing: 1px;">
                <img src="assets/logo.png" alt="Logo" class="nav-icon">
                VOXELIO
            </div>

            <div class="tab-bar">
                <button id="btn-logic" class="tab-btn active" onclick="switchTab('logic')">Code Editor</button>
                <button id="btn-texture" class="tab-btn" onclick="switchTab('texture')">Texture Painter</button>
            </div>
        </div>

        <div class="actions" style="display: flex; align-items: center; gap: 10px;">
            <span id="currentProjectDisplay"
                style="color: var(--accent); margin: 0 10px; font-weight: bold; font-family: monospace; font-size: 12px;"></span>
            <button onclick="window.location.href='dashboard.html'" class="nav-btn">📂 Projekte</button>

            <div class="user-menu">
            </div>

            <button onclick="saveCurrent()" class="nav-btn">☁️ Save</button>

            <div class="engine-controls" style="margin-left: 10px; display: flex; gap: 5px;">
                <button class="btn run" onclick="App.run()" style="min-width: 80px;">START</button>
                <button class="btn stop" onclick="App.stop()">STOP</button>
            </div>
        </div>
    </div>
    <div id="main-container">
        <div id="blocklyArea">
            <div id="blocklyDiv" style="position: absolute;"></div>
        </div>

        <div id="textureEditor" style="display: none;">
            <div class="painter-layout">
                <div class="painter-tools">
                    <button class="tool-btn active" onclick="TextureEditor.setMode('paint', this)">✏️</button>
                    <button class="tool-btn" onclick="TextureEditor.setMode('erase', this)">🧽</button>
                    <button class="tool-btn" onclick="TextureEditor.setMode('fill', this)">🪣</button>
                    <button class="tool-btn" onclick="TextureEditor.toggleMirror(this)" title="Symmetrie">🪞</button>
                    <hr style="width:100%; border:0; border-top:1px solid var(--border)">
                    <button class="tool-btn" onclick="TextureEditor.darken()">🌙</button>
                    <button class="tool-btn" onclick="TextureEditor.brighten()">☀️</button>
                </div>

                <div class="canvas-card">
                    <canvas id="pixelCanvas" width="512" height="512"></canvas>
                    <div id="tex-status">> Pinsel aktiv.</div>
                </div>

                <div class="painter-settings">
                    <div class="setting-group">
                        <label>Farbe</label>
                        <input type="color" id="paintColor" value="#4CFF00"
                            style="width:100%; height:40px; border:none; border-radius:8px; cursor:pointer;">
                    </div>

                    <div class="setting-group">
                        <label>Textur Name</label>
                        <input type="text" id="textureName" placeholder="Name..." class="nav-btn"
                            style="text-align:left; background:#f8f9fa">
                    </div>

                    <div class="setting-group" style="margin-top:auto">
                        <button class="btn run" onclick="TextureEditor.save()" style="width:100%">Speichern</button>
                        <button class="btn stop" onclick="TextureEditor.clear()"
                            style="width:100%; margin-top:5px;">Leeren</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="resizer"></div>

        <div id="sidePanel">
            <div id="statusTag">System Bereit</div>
            <div id="canvas3d" tabindex="0">
            </div>
            <div style="position: absolute; top: 10px; right: 620px; z-index: 10001; display: flex; gap: 5px;">
                <button id="goFullscreen" onclick="App.toggleFullscreen(true)" class="nav-btn"
                    style="background: rgba(0,0,0,0.6);">max ⛶</button>
                <button id="exitFullscreen" onclick="App.toggleFullscreen(false)" class="nav-btn"
                    style="background: #ff5555; display: none;">min ✕</button>
            </div>
            <div class="panel-section">
                <div class="section-header">
                    <span>SCRIPTS</span>
                    <button class="add-btn" onclick="Editor.showModal()">+</button>
                </div>
                <div id="scriptList" class="scroll-area"></div>
            </div>
            <div class="panel-section">
                <div class="section-header">SCENE EXPLORER</div>
                <div id="sceneList" class="scroll-area"></div>
            </div>
            <div id="log">> Initialisierung abgeschlossen.</div>
        </div>
    </div>

    <div id="gameHUD"></div>

    <div id="save-status-cloud" class="save-cloud-icon">☁️ Autosave...</div>

    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h3>Neues Script erstellen</h3>
            <p>Gib einen Namen für dein Script ein:</p>
            <input type="text" id="scriptNameInput" placeholder="Name..." autofocus>
            <div class="modal-footer">
                <button class="btn run" onclick="Editor.createScript()">Erstellen</button>
                <button class="btn secondary" onclick="Editor.hideModal()">Abbrechen</button>
            </div>
        </div>
    </div>
    <xml id="toolbox" style="display: none">

        <category name="Events" colour="#FFD500">
            <block type="event_flag"></block>
            <block type="event_key"></block>
            <block type="event_tick"></block>

        </category>

        <category name="Formen" colour="#4C97FF">
            <block type="create_shape"></block>
            <block type="set_texture"></block>
            <block type="create_group"></block>
        </category>

        <category name="Bewegung" colour="#5CB1D6">
            <block type="set_position"></block>
            <block type="move_object"></block>
            <block type="set_scale"></block>
            <block type="set_dimensions"></block>
            <block type="set_rotation"></block>
            <block type="rotate_forever"></block>
        </category>

        <category name="Steuerung" colour="#a55b80">
            <block type="setup_fpc"></block>
            <block type="fpc_look"></block>
            <block type="fpc_move"></block>
            <block type="set_view_mode"></block>
            <block type="set_solid"></block>
            <block type="player_jump"></block>
        </category>

        <category name="Logik" colour="#5C81A6">
            <block type="logic_if"></block>
            <block type="logic_if_else"></block>
            <block type="logic_compare"></block>
            <block type="logic_boolean"></block>
            <block type="is_touching"></block>
            <block type="ui_button_pressed"></block>
            <block type="clone_object"></block>
        </category>

        <category name="Variablen" colour="#FFAB19">
            <block type="init_var"></block>
            <block type="set_var"></block>
            <block type="change_var"></block>
            <block type="get_var"></block>
            <block type="display_var"></block>
        </category>

        <category name="UI" colour="#A55B80">
            <block type="create_ui"></block>
            <block type="set_ui_parent"></block>
            <block type="remove_ui"></block>
            <block type="ui_hover_style"></block>
            <block type="style_ui"></block>
            <block type="ui_proximity_trigger"></block>
        </category>

        <category name="Text" colour="#5CB1D6">
            <block type="text"></block>
            <block type="text_join_simple"></block>
        </category>

        <category name="Mathe" colour="#FFD500">
            <block type="math_number"></block>
            <block type="colour_picker_custom"></block>
            <block type="get_matrix_value"></block>
            <block type="get_random_number"></block>
            
        </category>

        <category name="Umgebung" colour="#FFD500">
            <block type="set_light_intensity"></block>
            <block type="set_skybox_texture">
                <value name="TEXTURE">
                    <block type="text">
                        <field name="TEXT">MeineTextur1</field>
                    </block>
                </value>
            </block>
            <block type="set_floor_texture">
                <value name="TEXTURE">
                    <block type="text">
                        <field name="TEXT">Gras</field>
                    </block>
                </value>
            </block>
        </category>

    </xml>

    <script>

        let activeProjectName = "";
        let hasChanges = false;
        let autosaveTimer = null;


        window.addEventListener('beforeunload', (e) => {
            if (hasChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });


        function switchTab(tab) {
            const blocklyArea = document.getElementById('blocklyArea');
            const textureEditor = document.getElementById('textureEditor');
            const btnLogic = document.getElementById('btn-logic');
            const btnTex = document.getElementById('btn-texture');

            if (tab === 'logic') {
                blocklyArea.style.display = 'block';
                textureEditor.style.display = 'none';
                btnLogic.classList.add('active');
                btnTex.classList.remove('active');
                if (window.workspace) Blockly.svgResize(window.workspace);
            } else {
                blocklyArea.style.display = 'none';
                textureEditor.style.display = 'block';
                btnLogic.classList.remove('active');
                btnTex.classList.add('active');
            }
        }


        function startGlobalAutosave() {
            if (autosaveTimer) clearInterval(autosaveTimer);

            autosaveTimer = setInterval(async () => {
                if (hasChanges && activeProjectName) {
                    console.log("☁️ Autosave wird ausgeführt...");
                    await saveCurrent(true);
                }
            }, 5000);
        }
        async function saveCurrent(isSilent = false) {
            if (!activeProjectName) return;


            if (window.Editor && window.workspace) {
                Editor.scripts[Editor.currentScript] = Blockly.serialization.workspaces.save(window.workspace);
            }

            try {
                if (isSilent) {
                    const cloudIcon = document.getElementById('save-status-cloud');
                    if (cloudIcon) {
                        cloudIcon.style.display = 'block';

                    }
                }

                if (window.AuthHandler) {

                    await AuthHandler.saveToCloud(activeProjectName, isSilent);
                    hasChanges = false;
                    console.log("✅ Speichern erfolgreich.");
                }
            } catch (err) {
                console.error("❌ Speicherfehler:", err);
                if (!isSilent) alert("Fehler beim Speichern!");
            } finally {
                if (isSilent) {
                    setTimeout(() => {
                        document.getElementById('save-status-cloud').style.display = 'none';
                    }, 1000);
                }
            }
        }


        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            activeProjectName = params.get('project');
            const isProjectNew = params.get('new') === 'true';

            // NEU: Den Besitzer aus der URL auslesen (für geteilte Projekte)
            const projectOwner = params.get('owner');

            if (!activeProjectName) {
                console.warn("Kein Projekt ausgewählt. Umleitung zum Dashboard...");
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('currentProjectDisplay').innerText = activeProjectName;

            const checkAuth = setInterval(() => {
                // Wir warten, bis alle Handler bereit sind
                if (window.AuthHandler && AuthHandler.user && window.UI && window.Editor) {
                    clearInterval(checkAuth);

                    if (isProjectNew) {
                        console.log("Erstelle neues Projekt...");
                        window.activeProjectName = activeProjectName;
                        window.Editor.scripts = { "Main": {} };
                        window.Editor.currentScript = "Main";
                        window.App.textures = {};
                        if (window.Editor.renderList) window.Editor.renderList();

                        setTimeout(async () => {
                            if (window.AuthHandler && AuthHandler.user) {
                                await window.AuthHandler.saveToCloud(window.activeProjectName, false);
                            }
                        }, 1500);
                    } else {
                        // NEU: UI.loadFromCloud wird jetzt mit dem owner aufgerufen, falls vorhanden
                        // Wenn kein owner da ist, nutzt die Funktion automatisch die eigene UID
                        window.UI.loadFromCloud(activeProjectName, projectOwner);
                    }

                    startGlobalAutosave();

                    // Blockly Change Listener (bestehend lassen...)
                    if (window.workspace) {
                        window.workspace.addChangeListener((e) => {
                            if (e.isUiEvent || e.type === Blockly.Events.FINISHED_LOADING) return;
                            hasChanges = true;
                        });
                    }
                }
            }, 500);
        });
    </script>

</body>

</html>
