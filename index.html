<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxelio</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="blocklyArea"></div>
    <div id="resizer"></div>
    <div id="sidePanel">
        <div id="statusTag">System Bereit</div>
        <div class="toolbar">
            <button class="btn run" onclick="App.run()">START</button>
            <button class="btn stop" onclick="App.stop()">STOP</button>
        </div>
        <div id="canvas3d" tabindex="0"></div>
        <div class="panel-section">
            <div class="section-header">
                <span>SCRIPTS</span>
                <button class="add-btn" onclick="Editor.showModal()">+</button>
            </div>
            <div id="scriptList" class="scroll-area"></div>
        </div>
        <div class="panel-section">
            <div class="section-header">SCENE EXPLORER</div>
            <div id="sceneList" class="scroll-area"></div>
        </div>
        <div id="log">> System bereit.</div>
    </div>
    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h3>Neues Script</h3>
            <input type="text" id="scriptNameInput" placeholder="Name..." autofocus>
            <div class="modal-footer">
                <button class="btn run" onclick="Editor.createScript()">Erstellen</button>
                <button class="btn secondary" onclick="Editor.hideModal()">Abbrechen</button>
            </div>
        </div>
    </div>
    <xml id="toolbox" style="display: none">
        <category name="Events" colour="#FFD500">
            <block type="event_flag"></block>
            <block type="event_key"></block>
        </category>
        <category name="3D Formen" colour="#4C97FF">
            <block type="create_shape"></block>
            <block type="create_group"></block>
           
        </category>
        <category name="Bewegung" colour="#5CB1D6">
            <block type="set_position"></block>
            <block type="move_object"></block>
            <block type="set_scale"></block>
            <block type="rotate_forever"></block>
             <block type="math_number"><field name="NUM">1</field></block>
        </category>
        <category name="Design" colour="#9966FF">
            <block type="colour_picker_custom"></block>
        </category>
    </xml>
    <script src="src/js/engine.js"></script>
    <script src="src/js/blocks.js"></script>
</body>
</html>
