<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Voxelio - Dashboard</title>
    <link rel="stylesheet" href="src/dasboardstyle.css?v=1.2">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
    apiKey: "FIREBASE_API_KEY_PLACEHOLDER",
    authDomain: "FIREBASE_AUTH_DOMAIN_PLACEHOLDER",
    projectId: "FIREBASE_PROJECT_ID_PLACEHOLDER",
    storageBucket: "FIREBASE_STORAGE_BUCKET_PLACEHOLDER",
    messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID_PLACEHOLDER",
    appId: "FIREBASE_APP_ID_PLACEHOLDER"
};

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>
    
    <script src="src/js/authHandler.js?v=1.0"></script>
    <script src="src/js/projectHandler.js?v=1.0"></script>

    <style>
        .section-divider { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin: 40px 0; }
        .btn-group { display: flex; gap: 5px; }
        .share-btn { background: #4a4a4a; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .share-btn:hover { background: #666; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="brand">
            <img src="assets/Logo.png" alt="Logo" class="logo-img"> 
            VOXELIO
        </div>
        <div class="actions">
            <div class="user-menu">
                <button id="loginBtn" onclick="AuthHandler.handleUserClick()" class="nav-btn">🔑 Login</button>
                <div id="userDropdown" class="dropdown-content">
                    <div id="userEmail" class="user-info"></div>
                    <button onclick="window.location.href='Ideas.html'" class="Change-btn">Developer Road Map</button>
                    <button onclick="AuthHandler.logout()" class="logout-btn">🚪 Abmelden</button>
                </div>
            </div>
            <button class="nav-btn run-btn" onclick="openCreateModal()">+ Neues Projekt</button>
        </div>
    </div>

    <div class="dashboard-content">
        <div class="section-header">
            <h2>Meine Projekte</h2>
        </div>
        <div id="projectGrid" class="project-grid">
            <p>Lade eigene Projekte...</p>
        </div>

        <hr class="section-divider">

        <div class="section-header">
            <h2>Für mich freigegeben</h2>
        </div>
        <div id="sharedGrid" class="project-grid">
            <p>Lade freigegebene Projekte...</p>
        </div>
    </div>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h3>Neues Projekt erstellen</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Gib deinem Projekt einen Namen</p>
            <input type="text" id="newProjectName" placeholder="z.B. Mein Projekt 1">
            <div class="modal-actions">
                <button onclick="closeModal()" class="nav-btn">Abbrechen</button>
                <button onclick="confirmCreateProject()" class="run2-btn">Erstellen</button>
            </div>
        </div>
    </div>

    <script>
        // --- Modal Logik ---
        function openCreateModal() {
            document.getElementById('projectModal').style.display = 'block';
            document.getElementById('newProjectName').focus();
        }

        function closeModal() {
            document.getElementById('projectModal').style.display = 'none';
            document.getElementById('newProjectName').value = '';
        }

        function confirmCreateProject() {
            const nameInput = document.getElementById('newProjectName');
            const name = nameInput.value.trim();
            if (name) {
                window.location.href = `index.html?project=${encodeURIComponent(name)}&new=true`;
            } else {
                nameInput.style.borderColor = 'red';
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('projectModal');
            if (event.target == modal) closeModal();
        }

        // --- Hilfsfunktion zum Öffnen von Projekten (auch fremde) ---
        function openProject(ownerUid, projectId) {
            window.location.href = `index.html?project=${encodeURIComponent(projectId)}&owner=${ownerUid}`;
        }

        // --- Projekt löschen ---
        async function deleteProject(projectId) {
            if (confirm(`Projekt "${projectId}" wirklich löschen?`)) {
                const user = firebase.auth().currentUser;
                if (!user) return;
                try {
                    await firebase.firestore()
                        .collection("users").doc(user.uid)
                        .collection("projects").doc(projectId)
                        .delete();
                    location.reload(); 
                } catch (e) {
                    console.error(e);
                }
            }
        }

        // --- Hauptlogik: Projekte laden ---
        firebase.auth().onAuthStateChanged(async (user) => {
            const grid = document.getElementById('projectGrid');
            const sharedGrid = document.getElementById('sharedGrid');
            
            if (user) {
                // 1. Eigene Projekte laden
                try {
                    const ownSnapshot = await firebase.firestore()
                        .collection("users").doc(user.uid)
                        .collection("projects")
                        .orderBy("lastUpdated", "desc")
                        .get();
                    
                    renderGrid(ownSnapshot, grid, true, user.uid);
                } catch (e) {
                    console.error("Fehler eigene Projekte:", e);
                    grid.innerHTML = "<p>Fehler beim Laden.</p>";
                }

                // 2. Geteilte Projekte laden (CollectionGroup)
                try {
                    const sharedSnapshot = await firebase.firestore()
                        .collectionGroup("projects")
                        .where("sharedWith", "array-contains", user.email.toLowerCase())
                        .get();
                    
                    renderGrid(sharedSnapshot, sharedGrid, false, user.uid);
                } catch (e) {
                    console.error("Fehler geteilte Projekte:", e);
                    sharedGrid.innerHTML = "<p>Noch keine freigegebenen Projekte gefunden.</p>";
                }
            } else {
                grid.innerHTML = "<p>Bitte logge dich ein.</p>";
                sharedGrid.innerHTML = "";
            }
        });

        function renderGrid(snapshot, container, isOwner, currentUserUid) {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = isOwner ? "<p>Keine eigenen Projekte.</p>" : "<p>Keine geteilten Projekte.</p>";
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const projectId = doc.id;
                // UID des Besitzers extrahieren (Dokument-Pfad ist users/{uid}/projects/{id})
                const ownerUid = doc.ref.parent.parent.id;

                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <h3>${projectId}</h3>
                    <div class="card-footer">
                        <button class="open-btn" onclick="openProject('${ownerUid}', '${projectId}')">Öffnen</button>
                        <div class="btn-group">
                            ${isOwner ? `
                                <button class="share-btn" onclick="ProjectHandler.shareWithEmail('${projectId}')" title="Per E-Mail teilen">📧</button>
                                <button class="delete-btn" onclick="deleteProject('${projectId}')">🗑️</button>
                            ` : `<small>Von: ${ownerUid === currentUserUid ? 'Dir' : 'Anderem User'}</small>`}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
