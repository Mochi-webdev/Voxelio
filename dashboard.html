<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Voxelio - Dashboard</title>
    <link rel="stylesheet" href="src/dasboardstyle.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4CUiHx0GhixnFp76V5zFR2s49ETOYpwQ",
            authDomain: "voxelio-f1bf5.firebaseapp.com",
            projectId: "voxelio-f1bf5",
            storageBucket: "voxelio-f1bf5.firebasestorage.app",
            messagingSenderId: "981770039529",
            appId: "1:981770039529:web:5b93f9c830cd5c30ffc078"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>
    
    <script src="src/js/authHandler.js"></script>
</head>
<body>
    <div class="top-nav">
        <div class="brand">
            <img src="assets/Logo.png" alt="Logo" class="logo-img"> 
            VOXELIO
        </div>
        <div class="actions">
            <div class="user-menu">
                <button id="loginBtn" onclick="AuthHandler.handleUserClick()" class="nav-btn">🔑 Login</button>
                <div id="userDropdown" class="dropdown-content">
                    <div id="userEmail" class="user-info"></div>
                    <button onclick="AuthHandler.logout()" class="logout-btn">🚪 Abmelden</button>
                </div>
            </div>
            <button class="nav-btn run-btn" onclick="openCreateModal()">+ Neues Projekt</button>
        </div>
    </div>

    <div class="dashboard-content">
        <h2>Deine Projekte</h2>
        <div id="projectGrid" class="project-grid">
            </div>
    </div>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h3>Neues Projekt erstellen</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Gib deinem Projekt einen Namen</p>
            <input type="text" id="newProjectName" placeholder="z.B. Mein Projekt 1">
            <div class="modal-actions">
                <button onclick="closeModal()" class="nav-btn">Abbrechen</button>
                <button onclick="confirmCreateProject()" class="run2-btn">Erstellen</button>
            </div>
        </div>
    </div>

    <script>
        // --- Modal Logik ---
        function openCreateModal() {
            document.getElementById('projectModal').style.display = 'block';
            document.getElementById('newProjectName').focus();
        }

        function closeModal() {
            document.getElementById('projectModal').style.display = 'none';
            document.getElementById('newProjectName').value = '';
        }

        function confirmCreateProject() {
            const nameInput = document.getElementById('newProjectName');
            const name = nameInput.value.trim();
            if (name) {
                window.location.href = `index.html?project=${encodeURIComponent(name)}&new=true`;
            } else {
                nameInput.style.borderColor = 'red';
            }
        }

        // Modal schließen wenn man außerhalb klickt
        window.onclick = function(event) {
            const modal = document.getElementById('projectModal');
            if (event.target == modal) closeModal();
        }

        // --- Projekt löschen Funktion ---
        async function deleteProject(projectId) {
            if (confirm(`Möchtest du das Projekt "${projectId}" wirklich unwiderruflich löschen?`)) {
                const user = firebase.auth().currentUser;
                if (!user) return;

                try {
                    await firebase.firestore()
                        .collection("users").doc(user.uid)
                        .collection("projects").doc(projectId)
                        .delete();
                    
                    // Grid nach dem Löschen aktualisieren
                    console.log(`Projekt ${projectId} gelöscht.`);
                    location.reload(); 
                } catch (e) {
                    console.error("Fehler beim Löschen:", e);
                    alert("Fehler beim Löschen: " + e.message);
                }
            }
        }

        // --- Projekte laden & Grid befüllen ---
        firebase.auth().onAuthStateChanged(async (user) => {
            const grid = document.getElementById('projectGrid');
            if (user) {
                grid.innerHTML = "<p>Lade deine Welten...</p>";
                try {
                    const snapshot = await firebase.firestore()
                        .collection("users").doc(user.uid)
                        .collection("projects")
                        .orderBy("updatedAt", "desc") // Neueste zuerst
                        .get();
                    
                    grid.innerHTML = "";
                    if (snapshot.empty) {
                        grid.innerHTML = "<p>Noch keine Projekte vorhanden. Erstelle dein erstes!</p>";
                        return;
                    }

                    snapshot.forEach(doc => {
                        const div = document.createElement('div');
                        div.className = 'project-card';
                        div.innerHTML = `
                            <h3>${doc.id}</h3>
                            <div class="card-footer">
                                <button class="open-btn" onclick="window.location.href='index.html?project=${doc.id}'">Öffnen</button>
                                <button class="delete-btn" onclick="deleteProject('${doc.id}')" title="Projekt löschen">
                                    🗑️
                                </button>
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                } catch (e) {
                    console.error("Fehler beim Laden:", e);
                    grid.innerHTML = "<p>Fehler beim Laden der Projekte. Bitte Seite neu laden.</p>";
                }
            } else {
                grid.innerHTML = "<p>Bitte logge dich ein, um deine Projekte zu sehen.</p>";
            }
        });
    </script>
</body>
</html>
